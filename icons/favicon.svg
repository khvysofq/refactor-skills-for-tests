<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Dark rounded background -->
  <rect width="100" height="100" rx="22" ry="22" fill="#0a0c10"/>

  <!-- Subtle center glow -->
  <radialGradient id="glow" cx="50%" cy="55%" r="45%">
    <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#0a0c10" stop-opacity="0"/>
  </radialGradient>
  <rect width="100" height="100" rx="22" ry="22" fill="url(#glow)"/>

  <!-- Root node (blue filled) -->
  <circle cx="50" cy="22" r="7" fill="#58a6ff"/>

  <!-- Stem down from root -->
  <line x1="50" y1="29" x2="50" y2="40" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Horizontal branch -->
  <line x1="28" y1="40" x2="72" y2="40" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left branch node (outlined) -->
  <line x1="28" y1="40" x2="28" y2="52" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="28" cy="58" r="6" fill="none" stroke="#58a6ff" stroke-width="2.5"/>

  <!-- Right branch node (outlined) -->
  <line x1="72" y1="40" x2="72" y2="52" stroke="#58a6ff" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="72" cy="58" r="6" fill="none" stroke="#58a6ff" stroke-width="2.5"/>

  <!-- Left sub-branches -->
  <line x1="28" y1="64" x2="28" y2="70" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="70" x2="40" y2="70" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="70" x2="16" y2="76" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="70" x2="40" y2="76" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>
  <!-- Left leaf nodes (green filled) -->
  <circle cx="16" cy="82" r="5.5" fill="#3fb950"/>
  <circle cx="40" cy="82" r="5.5" fill="#3fb950"/>

  <!-- Right sub-branches -->
  <line x1="72" y1="64" x2="72" y2="70" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="70" x2="84" y2="70" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="60" y1="70" x2="60" y2="76" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>
  <line x1="84" y1="70" x2="84" y2="76" stroke="#58a6ff" stroke-width="2" stroke-linecap="round"/>
  <!-- Right leaf nodes (green filled) -->
  <circle cx="60" cy="82" r="5.5" fill="#3fb950"/>
  <circle cx="84" cy="82" r="5.5" fill="#3fb950"/>
</svg>
